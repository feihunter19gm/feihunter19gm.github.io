<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HTML 游戏区 · 魔界游戏厅</title>
  <style>
    body {
      margin: 0;
      color: #f5f7fb;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      background: radial-gradient(circle at 18% 0, rgba(255, 211, 84, .12), transparent 28%), linear-gradient(135deg, #071a3d, #090b10);
    }

    main {
      width: min(960px, calc(100% - 28px));
      margin: 0 auto;
      padding: 28px 0;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(30px, 6vw, 52px);
    }

    p {
      color: rgba(245, 247, 251, .72);
      line-height: 1.75;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 16px;
      margin-top: 22px;
    }

    .card {
      padding: 20px;
      border: 1px solid rgba(255, 255, 255, .1);
      border-radius: 18px;
      background: rgba(20, 26, 39, .82);
      box-shadow: 0 18px 60px rgba(0, 0, 0, .28);
    }

    .tag {
      color: #ffd354;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .14em;
    }

    a.btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      margin-top: 10px;
      padding: 0 14px;
      border-radius: 999px;
      color: #fff;
      background: linear-gradient(135deg, #ffd354, #ffb020);
      color: #071a3d;
      font-weight: 800;
      text-decoration: none;
    }

    code {
      padding: 2px 5px;
      border-radius: 5px;
      color: #b9e7ff;
      background: rgba(73, 177, 245, .14);
    }
  </style>
</head>
<body>
  <main>
    <a href="/" style="color:#9bd8ff">← 返回首页</a>
    <h1>HTML 游戏区</h1>
    <p>这里是后期扩展游戏的入口页。把新的 HTML 小游戏放到 <code>source/games/游戏文件夹/</code>，再在这个页面加一张卡片即可。</p>

    <section class="grid">
      <article class="card">
        <div class="tag">MD ONLINE</div>
        <h2>MD 在线模拟器</h2>
        <p>支持本地选择合法 ROM 文件，手机端有虚拟按键。</p>
        <a class="btn" href="/games/md/">进入模拟器</a>
      </article>

      <article class="card">
        <div class="tag">COMING SOON</div>
        <h2>HTML 小游戏占位</h2>
        <p>后期你的自制小游戏或开源小游戏可以放在这里。</p>
      </article>
    </section>
  </main>
</body>
</html>
